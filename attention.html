<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>attention</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:black;
  font-family:Arial, sans-serif;
}

/* CAMERA */
video{
  position:fixed;

  width:70%;
  height:70%;

  object-fit:cover;

  top:50%;
  left:50%;

  transform:
    translate(-50%, -50%)
    scaleX(-1);
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:flex-start;

  pointer-events:none;
}

.title{
  margin-top:30px;

  color:white;
  font-size:20px;
  letter-spacing:2px;

  background:rgba(0,0,0,0.3);
  padding:10px 18px;
  border-radius:30px;

  backdrop-filter:blur(10px);
}

/* HEARTS */
.heart{
  position:absolute;

  font-size:40px;

  animation:floatUp 2s ease-out forwards;

  pointer-events:none;
  user-select:none;
}

@keyframes floatUp{

  0%{
    opacity:0;
    transform:
      translate(-50%, 0)
      scale(0.5);
  }

  20%{
    opacity:1;
  }

  100%{
    opacity:0;

    transform:
      translate(-50%, -120vh)
      scale(1.5)
      rotate(20deg);
  }

}

.instruction{
  position:fixed;
  bottom:30px;
  width:100%;

  text-align:center;
  color:white;

  font-size:14px;
  letter-spacing:1px;

  z-index:10;
}

</style>
</head>

<body>

<!-- CAMERA -->
<video id="camera" autoplay playsinline></video>

<script>

/* ACCESS CAMERA */

const video = document.getElementById("camera");

navigator.mediaDevices
  .getUserMedia({
    video:true,
    audio:false
  })

  .then((stream) => {
    video.srcObject = stream;
  })

  .catch((err) => {
    alert("camera access denied");
  });

/* AUTO FLOATING HEARTS */

const hearts = ["💖","💕","💘","💗"];

function createHeart(){

  const heart = document.createElement("div");

  heart.classList.add("heart");

  heart.innerText =
    hearts[Math.floor(Math.random() * hearts.length)];

  // random screen position
  heart.style.left =
    Math.random() * window.innerWidth + "px";

  // start near bottom
  heart.style.top =
    window.innerHeight + "px";

  // random size
  heart.style.fontSize =
    20 + Math.random() * 40 + "px";

  // random animation duration
  heart.style.animationDuration =
    2 + Math.random() * 3 + "s";

  document.body.appendChild(heart);

  // remove after animation
  setTimeout(() => {
    heart.remove();
  }, 5000);

}

/* CONTINUOUS HEART LOOP */

setInterval(createHeart, 300);

</script>

</body>
</html>
