<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>messages</title>

<style>

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:#e5e5ea;
    height:100vh;
    overflow:hidden;
  }

  /* CHAT WRAPPER */
  .chat{
    display:flex;
    flex-direction:column;
    gap:10px;

    padding:40px;
    padding-top:80px;
  }


  /* MESSAGE BUBBLE */
  .bubble{
    max-width:70%;
    padding:12px 16px;

    border-radius:18px;
    background:#007aff;
    color:white;

    font-size:15px;
    line-height:1.3;

    align-self:flex-start;

    animation:pop 0.25s ease;
    word-wrap:break-word;
  }

  /* animation */
  @keyframes pop{
    from{
      opacity:0;
      transform:scale(0.8);
    }
    to{
      opacity:1;
      transform:scale(1);
    }
  }

  /* subtle timestamp style feel */
  .hint{
    position:fixed;
    bottom:20px;
    width:100%;
    text-align:center;

    font-size:12px;
    color:#888;
  }

</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="hint">tap anywhere to receive a message ✿</div>

<script>

const messages = [
  "you are loved",
  "someone is thinking about you",
  "you are enough",
  "your presence matters",
  "someone cares about you",
  "you are doing better than you think",
  "this feeling will pass",
  "someone is rooting for you",
  "you matter more than you know",
  "you can do this",
  "you look good",
  "i love you",
  "your feelings matter",
  "you are cherished"
];

const chat = document.getElementById("chat");

document.addEventListener("click", () => {

  const bubble = document.createElement("div");
  bubble.classList.add("bubble");

  bubble.innerText =
    messages[Math.floor(Math.random() * messages.length)];

  chat.appendChild(bubble);

  // auto scroll to bottom effect (like chat apps)
  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });

});

</script>

</body>
</html>
