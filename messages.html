<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>messages</title>
<link rel="stylesheet" href="https://use.typekit.net/nfn6fai.css">
  <link rel="icon" type="image/x-icon" href="favicon.png">

<style>

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body{
font-family: "lores-12", sans-serif;
font-weight: 400;
font-style: normal;
    background:#ffffff;
    height:90vh;
    overflow:hidden;
  }

  /* CHAT WRAPPER */
  .chat{
    display:flex;
    flex-direction:column;
    gap:10px;

    padding:40px;
    padding-top:20vh;
  }


  /* MESSAGE BUBBLE */
  .bubble{
    max-width:100%;
    padding:12px 16px;

    border-radius:18px;
    background:#007aff;
    color:white;

    font-size:15px;
    line-height:1.3;

    align-self:flex-start;

    animation:pop 0.25s ease;
    word-wrap:break-word;
  }

  /* animation */
  @keyframes pop{
    from{
      opacity:0;
      transform:scale(0.8);
    }
    to{
      opacity:1;
      transform:scale(1);
    }
  }

  /* subtle timestamp style feel */
  .hint{
    position:fixed;
    bottom:20px;
    width:100%;
    text-align:center;

    font-size:12px;
    color:#888;
  }

  .home{
  position:fixed;

  top:40px;
  left:40px;

  z-index:100;
}

.home img{
  width:50px;

  transition:0.25s ease;

  filter:
    drop-shadow(0 0 10px rgba(255,192,203,0.5));
}

.home img:hover{
  transform:
    scale(0.9)
    rotate(-8deg);

  opacity:0.8;
}

.home img:active{
  transform:
    scale(0.8)
    rotate(8deg);
}

</style>
</head>

<body>

  <!-- HOME -->

<div class="home">

  <a href="https://charlotteip8.github.io/digitalove">

    <img src="favicon.png">

  </a>

</div>

<div class="chat" id="chat"></div>

<div class="hint">tap anywhere to receive a message</div>

<script>

const messages = [
  "you are loved",
  "someone is thinking about you",
  "you are enough",
  "your presence matters",
  "someone cares about you",
  "you are doing better than you think",
  "this feeling will pass",
  "someone is rooting for you",
  "you matter more than you know",
  "you can do this",
  "you look good",
  "i love you",
  "your feelings matter",
  "you are cherished"
];

const chat = document.getElementById("chat");

document.addEventListener("click", () => {

  const bubble = document.createElement("div");
  bubble.classList.add("bubble");

  bubble.innerText =
    messages[Math.floor(Math.random() * messages.length)];

  chat.appendChild(bubble);

  // auto scroll to bottom effect (like chat apps)
  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });

});

</script>

</body>
</html>
